name: Build Tweak

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export THEOS=~/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      - name: Build DEB (Rootful)
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1

      - name: Upload DEB (Rootful)
        uses: actions/upload-artifact@v4
        with:
          name: Phantom-rootful.deb
          path: packages/*.deb

      - name: Build DEB (Rootless)
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1 ROOTLESS=1

      - name: Upload DEB (Rootless)
        uses: actions/upload-artifact@v4
        with:
          name: Phantom-rootless.deb
          path: packages/*.deb
